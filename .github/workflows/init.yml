name: init

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Name of app (e.g. my-app)'
        required: true
        default: 'my-app'

jobs:
  create-vite-app:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cleanup
      run: |
        shopt -s extglob
        find . -mindepth 1 ! -path "./.github*" -exec rm -rf {} +

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Create App
      run: npm create vite@latest ${{ inputs.name }} -- --template react-ts

    - name: Move app to root
      run: |
        shopt -s dotglob
        mv ${{ inputs.name }}/* .
        rmdir ${{ inputs.name }}

    - name: Install Tailwind
      run: npm install tailwindcss @tailwindcss/vite

    - name: Setup Tailwind
      run: |
        grep -q "@tailwindcss/vite" vite.config.ts 2>/dev/null || {
          sed -i "s|import react from '@vitejs/plugin-react'|import react from '@vitejs/plugin-react'\nimport tailwindcss from '@tailwindcss/vite'|" vite.config.ts 2>/dev/null
          sed -i "s|plugins: \[react()\]|plugins: [react(), tailwindcss()]|" vite.config.ts 2>/dev/null
          echo '✅ Tailwind CSS configured in vite.config.ts'
        }
        grep -q '@import "tailwindcss";' src/index.css 2>/dev/null || {
          touch src/index.css 2>/dev/null
          printf '@import "tailwindcss";\n\n' | cat - src/index.css > temp.css 2>/dev/null && mv temp.css src/index.css
          echo '✅ Tailwind imported in src/index.css'
        }

    - name: Commit changes
      run: |
        git init
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m 'Set up app using Github Actions'

    - name: Push changes
      uses: ad-m/github-push-action@v0.6.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
        force: true